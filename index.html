<html>
<head>
    <title>Feedback</title>
    <style>
        .emoji-container {
            display: flex;
            justify-content: center;
            margin-top: 10px;
            flex-direction: column;
        }
        .emoji {
            margin: 5px;
            text-align: center;
        }
        .qr-code {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="qr-code">
        <img src="path/to/qr-code.png" alt="QR Code" /> 
    </div>
    <div class="emoji-container">
        <div class="emoji">
            <img src="path/to/smiley.png" alt="Smiley Emoji" />
            <p>Smiley</p>
        </div>
        <div class="emoji">
            <img src="path/to/thumbs-up.png" alt="Thumbs Up Emoji" />
            <p>Thumbs Up</p>
        </div>
        <div class="emoji">
            <img src="path/to/heart.png" alt="Heart Emoji" />
            <p>Heart</p>
        </div>
    </div>
</body>
</html>
